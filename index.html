<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>五子棋</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <h1>五子棋 Gomoku</h1>
    <div class="panel">
      <div class="status" id="status">輪到：黑棋</div>
      <button id="restartButton">重新開始</button>
    </div>
    <div class="board" id="board" aria-label="五子棋棋盤"></div>
    <p class="note">請點擊棋盤下棋。連成 5 顆即獲勝。</p>
  </main>
  <script src="script.js"></script>
</body>
</html>
